name: Initialize from template

on:
  push:
    branches: [main]

jobs:
  initialize:
    if: github.repository != 'henryfreel/starter-project-template-web'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Remove template marker
        run: |
          if grep -q 'data-template="true"' index.html; then
            sed -i 's/ data-template="true"//' index.html
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add index.html
            git commit -m "Initialize project from template"
            git push
          fi
